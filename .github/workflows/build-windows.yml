name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Windows EXE (portable)
        run: npm run dist -- --win --x64

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Daily-Text-Editor-Windows
          path: dist/*.exe
          retention-days: 30
